<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CRE</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-with-nav">
    <div class="page-toolbar" style="margin-bottom:12px;">
      <a href="/index.html" class="nav-back" title="Homepage">← Home</a>
    </div>
    <div class="auth-card" style="max-width:420px;">
      <h2>Login</h2>
      <p id="msg" class="flash flash-error" style="display:none;"></p>
      <form id="f" class="stacked-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
      <p class="muted" style="margin-top:12px;"><a href="/register.html">Register</a></p>
      <p class="muted" style="margin-top:8px;font-size:0.85rem;">Email matching is not case-sensitive.</p>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
(function () {
  function show(msg, ok) {
    var el = document.getElementById('msg');
    el.textContent = msg;
    el.className = ok ? 'flash flash-success' : 'flash flash-error';
    el.style.display = 'block';
  }
  function go(role) {
    if (role === 'admin') window.location.href = '/admin/dashboard.html';
    else if (role === 'lecturer') window.location.href = '/lecturer/dashboard.html';
    else if (role === 'student') window.location.href = '/student/dashboard.html';
    else window.location.href = '/index.html';
  }
  document.getElementById('f').addEventListener('submit', async function (e) {
    e.preventDefault();
    document.getElementById('msg').style.display = 'none';
    try {
      var csrf = await drasGetCsrf();
      var data = await drasApi('/api/auth/login', {
        method: 'POST',
        csrf: csrf,
        json: {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        },
      });
      if (data.user) go(data.user.role);
    } catch (err) {
      show(err.message || 'Login failed', false);
    }
  });
  drasMe().then(function (d) {
    if (d.user) go(d.user.role);
  }).catch(function () {});
})();
</script>
</body>
</html>
