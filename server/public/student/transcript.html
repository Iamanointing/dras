<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcript | Student</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-app">
<div class="shell">
  <div class="page-toolbar">
    <a href="/student/dashboard.html" class="nav-back">← Dashboard</a>
    <button type="button" class="btn btn-secondary" id="logout" style="float:right;">Logout</button>
  </div>
  <div class="panel">
    <h1 class="page-title">Official transcript</h1>
    <p class="muted">Pay the fee below, then upload your bank receipt (PDF or image).</p>
    <div id="pay" class="glass-card" style="padding:20px;margin:16px 0;"></div>
    <div id="status" class="glass-card" style="padding:20px;margin:16px 0;"></div>
    <form id="up" class="stacked-form" style="max-width:420px;">
      <label for="receipt">Payment receipt</label>
      <input type="file" id="receipt" name="receipt" accept=".pdf,.jpg,.jpeg,.png" required>
      <button type="submit" class="btn btn-primary">Upload receipt</button>
    </form>
    <p id="msg" class="flash" style="display:none;margin-top:12px;"></p>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
(function () {
  document.getElementById('logout').addEventListener('click', function () {
    drasLogout().then(function () { window.location.href = '/login.html'; });
  });

  function show(msg, ok) {
    var el = document.getElementById('msg');
    el.textContent = msg;
    el.className = ok ? 'flash flash-success' : 'flash flash-error';
    el.style.display = 'block';
  }

  drasMe().then(function (d) {
    if (!d.user || d.user.role !== 'student') {
      window.location.href = '/login.html';
      return null;
    }
    return drasApi('/api/student/transcript');
  }).then(function (t) {
    if (!t) return;
    var pay = t.payment;
    var el = document.getElementById('pay');
    if (pay) {
      el.innerHTML =
        '<h2 style="font-size:1rem;margin:0 0 8px;">Payment details</h2>' +
        '<p><strong>Bank:</strong> ' + escapeHtml(pay.bank_name) + '</p>' +
        '<p><strong>Account name:</strong> ' + escapeHtml(pay.account_name) + '</p>' +
        '<p><strong>Account number:</strong> ' + escapeHtml(pay.account_number) + '</p>' +
        '<p><strong>Fee:</strong> ₦' + Number(pay.fee).toFixed(2) + '</p>';
    } else {
      el.innerHTML = '<p class="muted">Payment details not configured.</p>';
    }
    var req = t.request;
    var st = document.getElementById('status');
    if (req) {
      st.innerHTML =
        '<h2 style="font-size:1rem;margin:0 0 8px;">Latest request</h2>' +
        '<p><strong>Status:</strong> ' + escapeHtml(req.status) + '</p>' +
        '<p><strong>Requested:</strong> ' + escapeHtml(req.request_date) + '</p>' +
        (req.payment_receipt_url
          ? '<p><a href="/' + escapeHtml(req.payment_receipt_url) + '" target="_blank" rel="noopener">View uploaded file</a></p>'
          : '');
    } else {
      st.innerHTML = '<p class="muted">No transcript request yet.</p>';
    }
  }).catch(function () { window.location.href = '/login.html'; });

  document.getElementById('up').addEventListener('submit', async function (e) {
    e.preventDefault();
    var file = document.getElementById('receipt').files[0];
    if (!file) return;
    try {
      var csrf = await drasGetCsrf();
      var fd = new FormData();
      fd.append('receipt', file);
      var r = await fetch('/api/student/transcript/upload', {
        method: 'POST',
        credentials: 'include',
        headers: { 'X-CSRF-Token': csrf },
        body: fd,
      });
      var j = await r.json().catch(function () { return {}; });
      if (!r.ok) throw new Error(j.error || r.statusText);
      show('Receipt uploaded. Awaiting admin approval.', true);
      setTimeout(function () { location.reload(); }, 1200);
    } catch (err) {
      show(err.message || 'Upload failed', false);
    }
  });

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
